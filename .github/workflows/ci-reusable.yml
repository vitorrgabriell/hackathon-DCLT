name: CI Reusable


on:
  workflow_call:
    inputs:
      service_name:
        description: "Nome do serviço (ex: ngo-service)"
        required: true
        type: string
      service_path:
        description: "Caminho do código-fonte do serviço (ex: ngo-service)"
        required: true
        type: string
      language:
        description: "Linguagem do serviço: go ou python"
        required: true
        type: string
      ecr_repository:
        description: "Nome do repositório ECR (ex: solidarytech/ngo-service)"
        required: true
        type: string
      sonar_project_key:
        description: "Project key no SonarCloud/SonarQube (ex: solidarytech-ngo-service)"
        required: true
        type: string
      gitops_path:
        description: "Caminho do serviço no repo solidarytech-gitops (ex: apps/ngo-service)"
        required: true
        type: string

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        if: ${{ inputs.language == 'go' }}
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.service_path }}/go.mod
          cache-dependency-path: ${{ inputs.service_path }}/go.sum

      - name: Go Build
        if: ${{ inputs.language == 'go' }}
        run: go build ./...

      - name: Go Test
        if: ${{ inputs.language == 'go' }}
        run: go test ./...

      - name: Setup Python
        if: ${{ inputs.language == 'python' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python Install Dependencies
        if: ${{ inputs.language == 'python' }}
        run: pip install -r requirements.txt

      - name: Python Test
        if: ${{ inputs.language == 'python' }}
        run: |
          if [ -d "tests" ] || find . -name "test_*.py" | grep -q .; then
            pip install pytest
            pytest
          else
            echo "Nenhum teste encontrado, pulando pytest"
          fi

  sonar-scan:
    name: Sonar SAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube/SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # A sonarqube-scan-action NÃO assume o SonarCloud por padrão — sem host
          # explícito ela monta uma URL sem scheme e falha com "Failed to get
          # server version". Default pro SonarCloud; defina o secret só se for
          # usar SonarQube self-hosted.
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        with:
          projectBaseDir: ${{ inputs.service_path }}
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}

  build-and-push:
    name: Docker Build, Trivy Scan & Push
    runs-on: ubuntu-latest
    needs: [test, sonar-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          IMAGE_TAG="sha-${SHORT_SHA}"
          ECR_REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${ECR_REGISTRY}/${{ inputs.ecr_repository }}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_uri_latest=${ECR_REGISTRY}/${{ inputs.ecr_repository }}:latest" >> "$GITHUB_OUTPUT"

      - name: Docker Build
        run: |
          docker build \
            -t "${{ steps.meta.outputs.image_uri }}" \
            -t "${{ steps.meta.outputs.image_uri_latest }}" \
            ${{ inputs.service_path }}

      - name: Trivy image scan (SCA)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ steps.meta.outputs.image_uri }}
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Docker Push
        run: |
          docker push "${{ steps.meta.outputs.image_uri }}"
          docker push "${{ steps.meta.outputs.image_uri_latest }}"

  update-gitops:
    name: Update GitOps
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/solidarytech-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update image tag in deployment
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"

          for f in gitops/${{ inputs.gitops_path }}/deployment*.yaml; do
            # [^"[:space:]]* em vez de [^ ]*: a aspa de fechamento NÃO é espaço,
            # então [^ ]* engolia o `"` do final e gerava YAML inválido
            # (image: "...:tag sem fechar). Os jobs passavam verdes e o ArgoCD
            # ficava sem conseguir parsear o manifesto.
            sed -i "s|\(image:.*${{ inputs.ecr_repository }}:\)[^\"[:space:]]*|\1${IMAGE_TAG}|" "$f"
          done

          # Falha cedo se o manifesto tiver saído inválido, em vez de commitar
          # YAML quebrado e descobrir só quando o deploy não acontecer.
          for f in gitops/${{ inputs.gitops_path }}/deployment*.yaml; do
            python3 -c "import yaml,sys; yaml.safe_load(open('$f'))" || {
              echo "::error::YAML inválido após atualizar a tag em $f"; exit 1; }
          done

      - name: Commit and push
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ inputs.gitops_path }}/deployment*.yaml
          git diff --cached --quiet && echo "Tag da imagem inalterada, pulando commit." && exit 0
          git commit -m "chore: update ${{ inputs.service_name }} image to ${{ needs.build-and-push.outputs.image_tag }}"
          git push
